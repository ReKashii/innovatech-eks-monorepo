# hpa-frontend.yaml
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend-hpa
  namespace: innovatech
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          # Mismo umbral de 50%, coherente con el patrón de tráfico
          # esperado hacia el frontend estático.
          averageUtilization: 50
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120
