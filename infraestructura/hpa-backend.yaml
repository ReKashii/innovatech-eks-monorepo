# hpa-backend.yaml
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: innovatech
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          # Umbral de 50%: da margen de reacción antes de saturar
          # la capacidad reservada en requests.cpu (250m).
          averageUtilization: 50
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120
